name: Build & Release

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create GitHub Release"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.set_tag.outputs.release_tag }}
      has_release: ${{ steps.check_release.outputs.has_release }}

    steps:
      - uses: actions/checkout@v4

      - name: Set release tag
        id: set_tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "release_tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "release_tag=build-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: |
          chmod a+x ./install-dependents.sh
          chmod a+x ./build.sh
          ./install-dependents.sh
          ./build.sh

      - name: Add binaries to production files
        run: wget --input-file=lib-urls.txt --directory-prefix=production-code/daemon/lib/

      - name: Create linux and windows build
        run: |
          cp -r production-code dist_linux
          mv production-code dist_windows

      - name: Copy startup scripts
        run: |
          cp prod-scripts/linux/* dist_linux/
          cp prod-scripts/windows/* dist_windows/

      - name: Copy license
        run: |
          cp LICENSE dist_linux/LICENSE
          cp LICENSE dist_windows/LICENSE

      - name: Copy node runtime to windows build
        run: |
          wget https://nodejs.org/download/release/latest-v20.x/win-x64/node.exe -O dist_windows/daemon/node_app.exe
          cp dist_windows/daemon/node_app.exe dist_windows/web/node_app.exe

      - name: Create archive (Linux)
        run: |
          mv dist_linux/ mcdmanager/
          tar czf mcdmanager_linux_release.tar.gz mcdmanager/
          tar --exclude="mcdmanager/daemon" --exclude="mcdmanager/start-daemon.sh" \
            -czf mcdmanager_linux_web_only_release.tar.gz mcdmanager/
          tar --exclude="mcdmanager/web" --exclude="mcdmanager/start-web.sh" \
            -czf mcdmanager_linux_daemon_only_release.tar.gz mcdmanager/
          rm -rf mcdmanager/

      - name: Create archive (Windows)
        run: |
          mv dist_windows/ mcdmanager/
          zip -r mcdmanager_windows_release.zip mcdmanager/
          zip -r mcdmanager_windows_web_only_release.zip mcdmanager/ \
            -x "mcdmanager/daemon/*" -x "mcdmanager/start-daemon*"
          zip -r mcdmanager_windows_daemon_only_release.zip mcdmanager/ \
            -x "mcdmanager/web/*" -x "mcdmanager/start-web*"
          rm -rf mcdmanager/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mcdmanager-build
          path: |
            mcdmanager_linux_release.tar.gz
            mcdmanager_linux_web_only_release.tar.gz
            mcdmanager_linux_daemon_only_release.tar.gz
            mcdmanager_windows_release.zip
            mcdmanager_windows_web_only_release.zip
            mcdmanager_windows_daemon_only_release.zip
          retention-days: 90

      - name: Check if we should create a release
        id: check_release
        run: |
          if [[ "${{ github.ref_type }}" == "tag" && "${{ github.ref_name }}" == v* ]]; then
            echo "has_release=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.create_release }}" == "true" ]]; then
            echo "has_release=true" >> $GITHUB_OUTPUT
          else
            echo "has_release=false" >> $GITHUB_OUTPUT
          fi

  release:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.has_release == 'true'

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: mcdmanager-build

      - name: List files
        run: ls -la

      - name: Determine release tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=build-${{ github.run_id }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: MCDManager ${{ steps.tag.outputs.tag }}
          body: |
            ## MCDManager ${{ steps.tag.outputs.tag }}

            自动构建发布。

            ### 安装方法

            **Linux 一键安装:**
            ```bash
            sudo su -c "wget -qO- https://raw.githubusercontent.com/xgp2012/MCDManager/master/prod-scripts/linux/install_mcdm.sh | bash"
            ```

            **手动安装:**
            1. 下载 `mcdmanager_linux_release.tar.gz` 或 `mcdmanager_windows_release.zip`
            2. 解压到服务器
            3. 运行 `start-web.sh` 和 `start-daemon.sh`

            ### 更新日志
            ${{ github.event.head_commit.message || '手动触发构建' }}
          files: |
            mcdmanager_linux_release.tar.gz
            mcdmanager_linux_web_only_release.tar.gz
            mcdmanager_linux_daemon_only_release.tar.gz
            mcdmanager_windows_release.zip
            mcdmanager_windows_web_only_release.zip
            mcdmanager_windows_daemon_only_release.zip
          fail_on_unmatched_files: false
          generate_release_notes: true
